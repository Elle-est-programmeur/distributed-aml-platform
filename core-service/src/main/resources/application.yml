server:
  port: 8080

spring:
  application:
    name: core-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tradesentry}
    username: ${DB_USER:tradesentry}
    password: ${DB_PASSWORD:tradesentry}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.tradesentry.core.events.model
        spring.json.value.default.type: com.tradesentry.core.events.model.TransactionEvent
        # Ignore the producer's __TypeId__ header (agent-service stamps its own class name on
        # adjudicated events) and always bind to this service's default.type.
        spring.json.use.type.headers: false

logging:
  level:
    com.tradesentry: INFO
