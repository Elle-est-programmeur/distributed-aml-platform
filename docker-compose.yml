services:
  postgres:
    image: postgres:16
    container_name: tradesentry-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tradesentry
      POSTGRES_USER: tradesentry
      POSTGRES_PASSWORD: tradesentry
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradesentry"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: tradesentry-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT binds all interfaces so the published 9092 port works; the CONTROLLER
      # listener must bind a routable host (matching the quorum voter 1@kafka:9093) because
      # apache/kafka:3.9.0's storage-format step rejects an advertised 0.0.0.0 controller.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      # Services now run inside the compose network and reach the broker by its service name.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  case-data-service:
    build:
      context: "."
      dockerfile: case-data-service/Dockerfile
    container_name: tradesentry-case-data
    ports:
      - "9090:9090"
    depends_on:
      kafka:
        condition: service_healthy

  agent-service:
    build:
      context: "."
      dockerfile: agent-service/Dockerfile
    container_name: tradesentry-agent
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      CASE_DATA_GRPC: static://case-data-service:9090
    depends_on:
      kafka:
        condition: service_healthy
      case-data-service:
        condition: service_started

  core-service:
    build:
      context: "."
      dockerfile: core-service/Dockerfile
    container_name: tradesentry-core
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tradesentry
      DB_USER: tradesentry
      DB_PASSWORD: tradesentry
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
